<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประปาหมู่บ้านสุขสำราญ - วารีสมาร์ท</title>

    <!-- Tailwind CSS (ดึงจากออนไลน์) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons (ดึงจากออนไลน์) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & ReactDOM (ดึงจากออนไลน์) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel สำหรับแปลงโค้ด React ให้เบราว์เซอร์อ่านออก -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #F2F2F7; /* iOS System Background */
        }
        /* iOS Style Glassmorphism & Shadow */
        .ios-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-card:active {
            transform: scale(0.97);
        }
        .ios-icon-container {
            display: flex;
            align-items: center;
            justify-center;
            border-radius: 1.2rem;
            width: 3.5rem;
            height: 3.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- จุดที่ระบบประปาจะมาแสดงผล -->
    <div id="root"></div>

    <script type="text/babel">
        // ดึงคำสั่งต่างๆ ของ React มาใช้งาน
        const { useState, useEffect, useMemo } = React;

        // --- Configuration & Constants ---
        const WATER_BILLS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ21tIMjRNKBcuSDz12h3fNE4aL1NP2Piz4RgtutVDNfUGZiS8jGc4j4IqmS1-YW4WPX9IUj22eUgeM/pub?gid=0&single=true&output=csv";
        const EXPENSES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ21tIMjRNKBcuSDz12h3fNE4aL1NP2Piz4RgtutVDNfUGZiS8jGc4j4IqmS1-YW4WPX9IUj22eUgeM/pub?gid=677756315&single=true&output=csv";
        const LOGIN_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwOa_3_Qp02ewIlHy1XbeMftubIkCbXFvX0NGU0fjboYRq-XLlDblcTBXI4f1ur9ZQ01nTigHYE7QJ/pub?output=csv";
        
        const USERS_CSV_URL = ""; // ใส่ลิงก์ทะเบียนผู้ใช้น้ำถ้ามี

        const WATER_RATE = 8;
        const MAINTENANCE_FEE = 15;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyV30gTDuqquU9CffmuK6aDB0Z-Vz8pOujiPmMSJ4c0VIo3X0K0XieJAPqsespEovNKOg/exec"; 

        // คอมโพเนนต์สำหรับแสดงไอคอน
        const Icon = ({ name, size, className = "" }) => (
            <i className={`fa-solid ${name} ${className}`} style={size ? { fontSize: size } : {}}></i>
        );

        // ฟังก์ชันสำหรับแปลงตัวเลขเป็นตัวอักษรไทย
        const THBText = (number) => {
            const numberText = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า", "สิบ"];
            const nameText = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
            let bahtText = "";
            if (isNaN(number) || number === 0) return "ศูนย์บาทถ้วน";
            let strNum = Math.floor(Math.abs(number)).toString();
            let strStang = (Math.abs(number) - Math.floor(Math.abs(number))).toFixed(2).split('.')[1];

            const convertToText = (str) => {
                let text = '';
                let len = str.length;
                for (let i = 0; i < len; i++) {
                    let n = parseInt(str[i]);
                    if (n !== 0) {
                        if (i === len - 1 && n === 1 && len > 1 && parseInt(str[len-2]) !== 0) text += "เอ็ด";
                        else if (i === len - 2 && n === 2) text += "ยี่";
                        else if (i === len - 2 && n === 1) text += "";
                        else text += numberText[n];
                        text += nameText[len - i - 1];
                    }
                }
                return text;
            };

            bahtText += convertToText(strNum) + "บาท";
            if (parseInt(strStang) === 0) bahtText += "ถ้วน";
            else bahtText += convertToText(strStang) + "สตางค์";
            return bahtText;
        };

        // --- iOS Style Cards ---
        const TransparencyCards = ({ metrics }) => (
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                {/* ค่าน้ำที่เก็บได้ */}
                <div className="ios-card p-6 flex flex-col items-center justify-center text-center">
                    <div className="ios-icon-container bg-blue-500 text-white shadow-lg shadow-blue-500/20 flex items-center justify-center">
                        <Icon name="fa-faucet-drip" className="text-xl sm:text-2xl" />
                    </div>
                    <p className="text-slate-500 text-[11px] md:text-sm font-bold uppercase tracking-widest mb-1.5">ค่าน้ำที่เก็บได้</p>
                    <div className="flex flex-col items-center">
                        <span className="text-2xl md:text-4xl font-extrabold text-slate-950 tracking-tighter">{metrics.currentMonthRevenue.toLocaleString()}</span>
                        <span className="text-[11px] md:text-base font-bold text-slate-400 uppercase">บาท</span>
                    </div>
                </div>

                {/* จ่ายค่าไฟสะสม */}
                <div className="ios-card p-6 flex flex-col items-center justify-center text-center">
                    <div className="ios-icon-container bg-orange-500 text-white shadow-lg shadow-orange-500/20 flex items-center justify-center">
                        <Icon name="fa-bolt-lightning" className="text-xl sm:text-2xl" />
                    </div>
                    <p className="text-slate-500 text-[11px] md:text-sm font-bold uppercase tracking-widest mb-1.5">จ่ายค่าไฟสะสม</p>
                    <div className="flex flex-col items-center">
                        <span className="text-2xl md:text-4xl font-extrabold text-slate-950 tracking-tighter">{metrics.totalElectricPaid.toLocaleString()}</span>
                        <span className="text-[11px] md:text-base font-bold text-slate-400 uppercase">บาท</span>
                    </div>
                </div>

                {/* ค่าไฟงวดล่าสุด */}
                <div className="ios-card p-6 flex flex-col items-center justify-center text-center">
                    <div className="ios-icon-container bg-yellow-400 text-white shadow-lg shadow-yellow-400/20 flex items-center justify-center">
                        <Icon name="fa-lightbulb" className="text-xl sm:text-2xl" />
                    </div>
                    <p className="text-slate-500 text-[11px] md:text-sm font-bold uppercase tracking-widest mb-1.5">ค่าไฟงวดล่าสุด</p>
                    <div className="flex flex-col items-center">
                        <span className="text-2xl md:text-4xl font-extrabold text-slate-950 tracking-tighter">{metrics.latestElectric.toLocaleString()}</span>
                        <span className="text-[11px] md:text-base font-bold text-slate-400 uppercase">บาท</span>
                    </div>
                </div>

                {/* เงินคงเหลือสะสม (The Hero Card) */}
                <div className="p-6 rounded-[2.5rem] bg-slate-950 text-white flex flex-col items-center justify-center text-center relative overflow-hidden shadow-2xl transition-all hover:scale-[1.03]">
                    <div className="ios-icon-container bg-white text-slate-950 z-10 flex items-center justify-center shadow-md">
                        <Icon name="fa-sack-dollar" className="text-xl sm:text-2xl" />
                    </div>
                    <p className="text-blue-200 text-[11px] md:text-sm font-bold uppercase tracking-widest mb-1.5 z-10">เงินคงเหลือสะสม</p>
                    <div className="flex flex-col items-center z-10">
                        <span className="text-2xl md:text-4xl font-extrabold text-white tracking-tighter">{metrics.latestBalance.toLocaleString()}</span>
                        <span className="text-[11px] md:text-base font-bold text-blue-300 uppercase">บาท</span>
                    </div>
                    <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/20 rounded-full blur-3xl"></div>
                </div>
            </div>
        );

        const ResidentView = ({ waterBills, searchQuery, setSearchQuery, metrics, setView, isLoggedIn }) => {
            const [selectedDate, setSelectedDate] = useState('');
            const uniqueDates = useMemo(() => [...new Set(waterBills.map(b => b.date))].filter(Boolean), [waterBills]);

            const filteredBills = useMemo(() => {
                return waterBills.filter(b => {
                    const query = searchQuery.trim().toLowerCase();
                    const matchQuery = !query || (b.houseNo && b.houseNo.toLowerCase().includes(query)) || (b.name && b.name.toLowerCase().includes(query));
                    const matchDate = !selectedDate || b.date === selectedDate;
                    return matchQuery && matchDate;
                });
            }, [waterBills, searchQuery, selectedDate]);

            return (
                <div className="max-w-6xl mx-auto space-y-12 animate-in fade-in duration-700">
                    <div className="text-center py-6 md:py-10 space-y-4">
                        <div className="flex justify-center mb-4">
                            <div className="ios-card p-5 shadow-sm inline-flex items-center justify-center">
                                <Icon name="fa-droplet" className="text-blue-600 text-4xl md:text-5xl" />
                            </div>
                        </div>
                        <h1 className="text-4xl md:text-6xl font-extrabold text-slate-950 tracking-tighter leading-tight">ประปาบ้านสุขสำราญ</h1>
                        <p className="text-slate-600 text-base md:text-xl font-semibold px-4 opacity-80">โปร่งใส ตรวจสอบได้ เพื่อความเป็นธรรมของชุมชน</p>
                        
                        <div className="flex justify-center pt-4">
                            {!isLoggedIn ? (
                                <button onClick={() => setView('login')} className="bg-white text-slate-950 px-10 py-3.5 rounded-full text-base font-bold shadow-sm border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-3">
                                    <Icon name="fa-lock" /> เข้าสู่ระบบจัดการ
                                </button>
                            ) : (
                                <button onClick={() => setView('admin_dashboard')} className="bg-slate-950 text-white px-10 py-3.5 rounded-full text-base font-bold shadow-xl hover:bg-black transition-all flex items-center gap-3">
                                    <Icon name="fa-user-gear" /> ไปที่หน้าจัดการ
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="space-y-6 md:space-y-8">
                        <h2 className="text-xl md:text-2xl font-black text-slate-950 flex items-center justify-center md:justify-start gap-3 px-2 uppercase tracking-widest">
                            <Icon name="fa-chart-line" className="text-blue-600" /> สรุปข้อมูลกองทุน
                        </h2>
                        <TransparencyCards metrics={metrics} />
                    </div>

                    <div className="bg-white rounded-[3rem] p-6 md:p-14 border border-slate-200/50 shadow-2xl space-y-12">
                        <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-8 text-center lg:text-left">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-950 tracking-tighter">ค้นหาประวัติการใช้น้ำ</h2>
                            <div className="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
                                <select className="px-6 py-4 md:py-5 bg-slate-100 border-none rounded-[1.5rem] text-lg font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all text-slate-900 cursor-pointer" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)}>
                                    <option value="">-- ทุกรอบบิล --</option>
                                    {uniqueDates.map((date, idx) => <option key={idx} value={date}>รอบวันที่ {date}</option>)}
                                </select>
                                <div className="relative w-full sm:w-[400px]">
                                    <Icon name="fa-magnifying-glass" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl" />
                                    <input type="text" placeholder="พิมพ์บ้านเลขที่ หรือ ชื่อ..." className="w-full pl-16 pr-6 py-4 md:py-5 bg-slate-100 border-none rounded-[1.5rem] text-xl font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all placeholder-slate-400 text-slate-950" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                            </div>
                        </div>

                        {searchQuery ? (
                            filteredBills.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {filteredBills.map((bill, idx) => (
                                        <div key={idx} className="ios-card p-8 md:p-10 flex flex-col gap-8">
                                            <div className="flex flex-col sm:flex-row justify-between items-start gap-4">
                                                <div className="space-y-2">
                                                    <span className={`px-4 py-1.5 rounded-full text-xs font-black uppercase ${bill.status === 'ชำระแล้ว' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{bill.status}</span>
                                                    <h3 className="text-2xl md:text-3xl font-extrabold text-slate-950 tracking-tighter">บ้านเลขที่ {bill.houseNo}</h3>
                                                    <p className="text-slate-700 font-bold text-lg">{bill.name}</p>
                                                    <p className="text-sm font-black text-blue-600 pt-1 tracking-widest">รอบบิล: {bill.date}</p>
                                                </div>
                                                <div className="text-left sm:text-right border-t sm:border-t-0 pt-4 sm:pt-0 w-full sm:w-auto">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">ยอดชำระสุทธิ</p>
                                                    <p className="text-4xl md:text-5xl font-extrabold text-slate-950 tracking-tighter">{bill.total.toLocaleString()} <span className="text-xl font-bold text-slate-400">บาท</span></p>
                                                </div>
                                            </div>
                                            <div className="h-px bg-slate-200/60 w-full" />
                                            <div className="grid grid-cols-2 gap-y-6 gap-x-4 text-sm md:text-base">
                                                <div className="space-y-1.5 font-bold"><p className="text-slate-400 font-black text-[10px] uppercase tracking-widest">เลขมิเตอร์</p><p className="text-slate-950 bg-white px-4 py-2 rounded-2xl border border-slate-100 inline-block shadow-sm">{bill.prev} ➔ {bill.after}</p></div>
                                                <div className="space-y-1.5 font-bold"><p className="text-slate-400 font-black text-[10px] uppercase tracking-widest">ปริมาณการใช้</p><p className="text-blue-700 bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 inline-block shadow-sm">{bill.unit} หน่วย</p></div>
                                                <div className="space-y-1.5 font-bold"><p className="text-slate-400 font-black text-[10px] uppercase tracking-widest">ค่าน้ำประปา</p><p className="text-slate-950">{bill.waterCost.toLocaleString()} บาท</p></div>
                                                <div className="space-y-1.5 font-bold"><p className="text-slate-400 font-black text-[10px] uppercase tracking-widest">ค่าบำรุงส่วนกลาง</p><p className="text-slate-950">{bill.maintenance.toLocaleString()} บาท</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="py-20 text-center space-y-4">
                                    <div className="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-slate-400"><Icon name="fa-magnifying-glass" className="text-4xl" /></div>
                                    <p className="text-slate-600 font-black text-xl">ไม่พบข้อมูลในรอบบิลนี้</p>
                                </div>
                            )
                        ) : (
                            <div className="py-20 text-center space-y-6">
                                <div className="bg-blue-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-blue-200"><Icon name="fa-search" className="text-4xl" /></div>
                                <p className="text-slate-500 font-black text-xl">ระบุบ้านเลขที่ด้านบนเพื่อตรวจสอบข้อมูล</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ setView, fetchData }) => (
            <div className="max-w-6xl mx-auto space-y-10 animate-in slide-in-from-bottom-10 duration-700">
                <div className="ios-card p-8 md:p-12 flex flex-col md:flex-row justify-between items-center gap-8">
                    <div className="text-center md:text-left">
                        <h2 className="text-4xl md:text-5xl font-extrabold text-slate-950 tracking-tighter">แผงควบคุมแอดมิน</h2>
                        <p className="text-slate-600 font-bold text-lg md:text-xl mt-2">จดมิเตอร์และบันทึกค่าใช้จ่ายรายเดือน</p>
                    </div>
                    <button onClick={fetchData} className="w-full md:w-auto bg-slate-950 text-white px-8 py-4 rounded-2xl font-black text-base flex items-center justify-center gap-3 hover:bg-black transition-all shadow-xl active:scale-95"><Icon name="fa-sync-alt" /> รีเฟรชข้อมูล</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <button onClick={() => setView('record_meter')} className="ios-card p-10 md:p-14 flex flex-col items-center text-center gap-8 group">
                        <div className="bg-blue-600 text-white p-8 rounded-3xl group-hover:scale-110 transition-transform shadow-xl shadow-blue-500/20"><Icon name="fa-circle-plus" className="text-5xl" /></div>
                        <div className="space-y-2"><h3 className="text-3xl font-extrabold tracking-tighter uppercase">บันทึกค่าน้ำ</h3><p className="text-slate-500 font-bold">จดมิเตอร์ลูกบ้าน</p></div>
                    </button>
                    <button onClick={() => setView('record_expense')} className="ios-card p-10 md:p-14 flex flex-col items-center text-center gap-8 group">
                        <div className="bg-orange-500 text-white p-8 rounded-3xl group-hover:scale-110 transition-transform shadow-xl shadow-orange-500/20"><Icon name="fa-file-invoice-dollar" className="text-5xl" /></div>
                        <div className="space-y-2"><h3 className="text-3xl font-extrabold tracking-tighter uppercase">บันทึกรายจ่าย</h3><p className="text-slate-500 font-bold">ค่าไฟฟ้าและซ่อมบำรุง</p></div>
                    </button>
                    <button onClick={() => setView('print_bills')} className="ios-card p-10 md:p-14 flex flex-col items-center text-center gap-8 group">
                        <div className="bg-slate-950 text-white p-8 rounded-3xl group-hover:scale-110 transition-transform shadow-xl"><Icon name="fa-print" className="text-5xl" /></div>
                        <div className="space-y-2"><h3 className="text-3xl font-extrabold tracking-tighter uppercase">ออกบิล PDF</h3><p className="text-slate-500 font-bold">พิมพ์ใบเสร็จค่าน้ำ</p></div>
                    </button>
                </div>
            </div>
        );

        const PrintBillsView = ({ setView, waterBills, loggedInUser }) => {
            const [selectedDate, setSelectedDate] = useState('');
            const uniqueDates = useMemo(() => [...new Set(waterBills.map(b => b.date))].filter(Boolean), [waterBills]);
            const billsToPrint = useMemo(() => waterBills.filter(b => b.date === selectedDate), [waterBills, selectedDate]);

            const handlePrint = () => {
                const content = document.getElementById('printable-area');
                if (!content) return;
                const printWindow = window.open('', '_blank');
                if (printWindow) {
                    printWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>พิมพ์บิลค่าน้ำประปาหมู่บ้านสุขสำราญ</title>
                            <script src="https://cdn.tailwindcss.com"><`+`/script>
                            <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
                            <style>
                            @page { size: A4 portrait; margin: 10mm; }
                            body { font-family: 'Prompt', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                            .print-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 5mm; }
                            .bill-card { break-inside: avoid; page-break-inside: avoid; }
                            </style>
                        </head>
                        <body class="bg-white">
                            <div class="print-grid">${content.innerHTML}</div>
                            <script>setTimeout(() => { window.print(); }, 1000);<`+`/script>
                        </body>
                        </html>
                    `);
                    printWindow.document.close();
                } else {
                    alert("กรุณาใช้ Ctrl + P เพื่อสั่งพิมพ์ครับ");
                    window.print();
                }
            };

            return (
                <div className="max-w-6xl mx-auto font-['Prompt']">
                    <div className="print:hidden space-y-6 mb-12">
                        <button onClick={() => setView('admin_dashboard')} className="flex items-center gap-2 text-slate-500 font-black hover:text-blue-600 transition-all uppercase tracking-widest"><Icon name="fa-chevron-left" /> กลับหน้าเมนู</button>
                        <div className="bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <h2 className="text-4xl font-extrabold text-slate-950 tracking-tighter">พิมพ์บิลรายเดือน</h2>
                                <p className="text-slate-600 font-bold mt-2 text-lg italic opacity-80">เลือกงวดบิลเพื่อพิมพ์ลงกระดาษ A4 (3 คอลัมน์)</p>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                                <select className="px-8 py-4 bg-slate-100 border-none rounded-2xl text-xl font-bold outline-none focus:ring-4 focus:ring-blue-100 w-full sm:w-auto" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)}>
                                    <option value="">-- เลือกรอบบิล --</option>
                                    {uniqueDates.map((date, idx) => <option key={idx} value={date}>งวดวันที่ {date}</option>)}
                                </select>
                                <button onClick={handlePrint} disabled={!selectedDate || billsToPrint.length === 0} className="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 hover:bg-blue-700 disabled:opacity-30 w-full sm:w-auto shadow-xl"><Icon name="fa-print" /> พิมพ์บิลตอนนี้</button>
                            </div>
                        </div>
                    </div>

                    {selectedDate && billsToPrint.length > 0 && (
                        <div id="printable-area" className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 print:grid-cols-3 print:gap-4 print:w-full">
                            {billsToPrint.map((bill, idx) => (
                                <div key={idx} className="bill-card border border-dashed border-slate-400 p-4 bg-white rounded-2xl print:rounded-[10px] text-slate-950 shadow-sm print:shadow-none">
                                    <div className="text-center border-b-2 border-slate-900 pb-3 mb-3"><h3 className="font-extrabold text-[15px] tracking-tight text-slate-950">ใบเสร็จรับเงินค่าน้ำประปา</h3><p className="text-[10px] font-black text-slate-600 mt-1 uppercase">ประจำงวดวันที่: {bill.date}</p></div>
                                    <div className="space-y-2 text-[12px] font-bold">
                                        <div className="flex justify-between bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200"><span className="text-slate-600 uppercase text-[9px]">บ้านเลขที่</span><span className="text-sm font-black">{bill.houseNo}</span></div>
                                        <div className="flex justify-between px-1"><span className="text-slate-600">ชื่อผู้ใช้:</span><span className="truncate max-w-[95px] text-slate-950">{bill.name}</span></div>
                                        <div className="flex justify-between px-1"><span className="text-slate-600">เลขมิเตอร์:</span><span className="text-slate-950">{bill.prev} ➔ {bill.after}</span></div>
                                        <div className="flex justify-between px-1"><span className="text-slate-600">จำนวนที่ใช้:</span><span className="text-blue-700">{bill.unit} หน่วย</span></div>
                                        <div className="flex justify-between px-1"><span className="text-slate-600">ค่าน้ำ:</span><span className="text-slate-950">{bill.waterCost.toLocaleString()} บาท</span></div>
                                        <div className="flex justify-between px-1"><span className="text-slate-600">ค่าบำรุง:</span><span className="text-slate-950">{bill.maintenance.toLocaleString()} บาท</span></div>
                                    </div>
                                    <div className="mt-3 pt-2 border-t-2 border-slate-900 flex justify-between items-end">
                                        <div className="flex flex-col"><span className="font-black text-slate-950 uppercase text-[10px]">รวมเงินทั้งสิ้น</span><span className="text-[10px] font-bold text-slate-700 mt-0.5 tracking-tighter">({THBText(bill.total)})</span></div>
                                        <span className="font-black text-2xl tracking-tighter text-slate-950">{bill.total.toLocaleString()} บาท</span>
                                    </div>
                                    <div className="mt-5 pt-2 text-center text-[11px] font-black text-slate-950"><p>ผู้รับเงิน .................................................</p><p className="text-[10px] font-bold text-slate-500 mt-2 italic">({loggedInUser})</p></div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const RecordMeterForm = ({ setView, users, registeredUsers, getPreviousMeterValue }) => {
            const [inputHouseNo, setInputHouseNo] = useState('');
            const [inputName, setInputName] = useState('');
            const [currentMeter, setCurrentMeter] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            
            const prevMeterVal = useMemo(() => getPreviousMeterValue(inputHouseNo), [inputHouseNo, getPreviousMeterValue]);
            const units = currentMeter ? parseFloat(currentMeter) - prevMeterVal : 0;
            const cost = units * WATER_RATE;
            const total = cost + MAINTENANCE_FEE;

            const handleHouseNoChange = (e) => {
                const val = e.target.value;
                setInputHouseNo(val);
                setCurrentMeter('');
                const foundUser = registeredUsers.find(u => u.id === val) || users.find(u => u.id === val);
                if (foundUser) setInputName(foundUser.name);
                else setInputName('');
            };

            return (
                <div className="max-w-2xl mx-auto space-y-8 pb-20">
                    <button onClick={() => setView('admin_dashboard')} className="flex items-center gap-2 text-slate-500 font-black hover:text-blue-600 transition-all uppercase tracking-widest"><Icon name="fa-chevron-left" /> กลับ</button>
                    <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-200/50">
                        <div className="bg-blue-600 p-10 md:p-16 text-white relative">
                            <h2 className="text-4xl md:text-5xl font-extrabold tracking-tighter mb-2 italic">RECORD</h2>
                            <p className="bg-white/20 w-fit px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em]">บันทึกข้อมูลการใช้น้ำ</p>
                            <Icon name="fa-faucet-drip" size={120} className="absolute right-8 top-1/2 -translate-y-1/2 opacity-20" />
                        </div>
                        <div className="p-10 md:p-16 space-y-10">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-3"><label className="text-xs font-black text-slate-600 uppercase tracking-widest ml-1">บ้านเลขที่</label><input type="text" className="w-full p-6 bg-slate-100 border-none rounded-[1.5rem] focus:ring-4 focus:ring-blue-100 outline-none text-2xl font-black transition-all text-slate-950" value={inputHouseNo} onChange={handleHouseNoChange} placeholder="ระบุเลขที่บ้าน" /></div>
                                <div className="space-y-3"><label className="text-xs font-black text-slate-600 uppercase tracking-widest ml-1">ชื่อผู้ใช้น้ำ</label><input type="text" className="w-full p-6 bg-slate-100 border-none rounded-[1.5rem] outline-none text-xl font-bold text-slate-700 cursor-not-allowed" value={inputName} readOnly placeholder="ดึงชื่ออัตโนมัติ" /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-3"><label className="text-xs font-black text-slate-600 uppercase tracking-widest ml-1">มิเตอร์ก่อน (Auto)</label><div className="p-6 bg-slate-50 rounded-[1.5rem] text-3xl font-black text-slate-400 text-center border border-slate-100">{prevMeterVal}</div></div>
                                <div className="space-y-3"><label className="text-xs font-black text-slate-950 uppercase tracking-widest ml-1">มิเตอร์จดใหม่</label><input type="number" className="w-full p-6 bg-white border-4 border-blue-100 rounded-[1.5rem] focus:border-blue-500 outline-none text-4xl font-black text-blue-700 text-center shadow-lg transition-all" placeholder="0000" value={currentMeter} onChange={(e) => setCurrentMeter(e.target.value)} /></div>
                            </div>
                            {inputHouseNo && inputName && (
                                <div className="bg-slate-50 rounded-[2.5rem] p-10 space-y-6 border border-slate-200">
                                    <div className="flex justify-between items-center"><span className="text-slate-600 font-bold uppercase text-xs tracking-widest">สรุปหน่วยน้ำ</span><span className="font-black text-blue-700 bg-blue-100/50 px-4 py-1.5 rounded-xl text-lg">{prevMeterVal} ➔ {currentMeter || '?'} = {units} หน่วย</span></div>
                                    <div className="h-px bg-slate-300" />
                                    <div className="flex justify-between items-center"><span className="text-xl font-black text-slate-950 uppercase tracking-tighter">ยอดสุทธิ</span><span className="text-5xl font-black text-blue-800 tracking-tighter">{total.toLocaleString()} <span className="text-2xl font-bold uppercase">บาท</span></span></div>
                                </div>
                            )}
                            <button className="w-full bg-blue-600 text-white py-6 rounded-[2rem] font-black text-xl flex justify-center items-center gap-4 hover:bg-blue-700 hover:scale-[1.01] active:scale-95 transition-all shadow-2xl disabled:opacity-30" disabled={!inputHouseNo || !currentMeter || units < 0 || isSaving} onClick={async () => { 
                                setIsSaving(true);
                                try {
                                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'record_meter', date: new Date().toLocaleDateString('en-GB'), houseNo: inputHouseNo, name: inputName, prev: prevMeterVal, after: currentMeter, unit: units, waterCost: cost, maintenance: MAINTENANCE_FEE, total: total, status: 'ค้างชำระ' }) });
                                    alert("บันทึกค่าน้ำเรียบร้อยแล้ว"); setView('admin_dashboard');
                                } catch (error) { alert("เกิดข้อผิดพลาดในการบันทึก"); } finally { setIsSaving(false); }
                            }}><Icon name="fa-save" size={28} /> {isSaving ? "กำลังบันทึก..." : "บันทึกข้อมูล"}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const RecordExpenseForm = ({ setView, metrics }) => {
            const [isSaving, setIsSaving] = useState(false);
            const [expenseDate, setExpenseDate] = useState(new Date().toISOString().split('T')[0]);
            const [electricBill, setElectricBill] = useState('');
            const [repairBill, setRepairBill] = useState('');

            return (
                <div className="max-w-2xl mx-auto space-y-8 pb-20">
                    <button onClick={() => setView('admin_dashboard')} className="flex items-center gap-2 text-slate-500 font-black hover:text-slate-800 uppercase tracking-widest"><Icon name="fa-chevron-left" /> กลับ</button>
                    <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden">
                        <div className="bg-slate-950 p-10 md:p-16 text-white relative">
                            <h2 className="text-4xl md:text-5xl font-extrabold tracking-tighter mb-2 italic">EXPENSE</h2>
                            <p className="bg-white/20 w-fit px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em]">บันทึกรายจ่าย</p>
                            <Icon name="fa-bolt-lightning" size={120} className="absolute right-8 top-1/2 -translate-y-1/2 opacity-20" />
                        </div>
                        <div className="p-10 md:p-16 space-y-12">
                            <div className="space-y-4"><label className="text-xs font-black text-slate-600 uppercase tracking-widest ml-1">วันที่ทำรายการ</label><input type="date" className="w-full p-6 bg-slate-100 border-none rounded-[1.5rem] font-bold text-xl outline-none focus:ring-4 focus:ring-blue-100 text-slate-950 shadow-inner" value={expenseDate} onChange={(e) => setExpenseDate(e.target.value)} /></div>
                            <div className="space-y-8">
                                <div className="space-y-4"><label className="text-sm font-black text-orange-600 uppercase flex items-center gap-3 tracking-widest ml-1"><Icon name="fa-bolt-lightning" /> ค่าไฟฟ้าหมู่บ้าน</label><input type="number" placeholder="0.00" value={electricBill} onChange={(e) => setElectricBill(e.target.value)} className="w-full p-8 bg-slate-100 border-none rounded-[2rem] text-5xl font-black outline-none focus:ring-4 focus:ring-orange-100 text-slate-950 shadow-inner" /></div>
                                <div className="space-y-4"><label className="text-sm font-black text-indigo-600 uppercase flex items-center gap-3 tracking-widest ml-1"><Icon name="fa-screwdriver-wrench" /> ค่าซ่อมบำรุง / อื่นๆ</label><input type="number" placeholder="0.00" value={repairBill} onChange={(e) => setRepairBill(e.target.value)} className="w-full p-8 bg-slate-100 border-none rounded-[2rem] text-5xl font-black outline-none focus:ring-4 focus:ring-indigo-100 text-slate-950 shadow-inner" /></div>
                            </div>
                            <div className="bg-yellow-50 p-10 rounded-[3rem] text-center border border-yellow-100"><p className="text-yellow-700 font-black uppercase text-xs tracking-[0.3em] mb-3">เงินกองทุนคงเหลือปัจจุบัน</p><p className="text-4xl md:text-5xl font-black text-slate-950 tracking-tighter">{metrics.latestBalance.toLocaleString()} <span className="text-2xl font-bold uppercase opacity-50">บาท</span></p></div>
                            <button className="w-full bg-slate-950 text-white py-6 rounded-[2rem] font-black text-xl flex justify-center items-center gap-4 hover:bg-black transition-all shadow-2xl disabled:opacity-30" disabled={isSaving || (!electricBill && !repairBill)} onClick={async () => { 
                                setIsSaving(true);
                                try {
                                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'record_expense', date: expenseDate, revenue: 0, electric: parseFloat(electricBill) || 0, repair: parseFloat(repairBill) || 0, balance: metrics.latestBalance - (parseFloat(electricBill||0) + parseFloat(repairBill||0)) }) });
                                    alert("บันทึกรายจ่ายเรียบร้อย"); setView('admin_dashboard');
                                } catch (error) { alert("เกิดข้อผิดพลาด"); } finally { setIsSaving(false); }
                            }}><Icon name="fa-check-circle" size={28} /> {isSaving ? "กำลังบันทึก..." : "ยืนยันการเบิกจ่าย"}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('resident'); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [waterBills, setWaterBills] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [users, setUsers] = useState([]);
            const [registeredUsers, setRegisteredUsers] = useState([]);
            const [authData, setAuthData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [loggedInUser, setLoggedInUser] = useState('นางศวรรยา  อุมงค์');

            const parseNumber = (val) => val ? parseFloat(val.toString().replace(/,/g, '').trim()) || 0 : 0;
            const parseCSV = (csv) => {
                if (!csv) return [];
                const lines = []; let currLine = []; let currCell = ''; let insideQuotes = false;
                for (let i = 0; i < csv.length; i++) {
                    const char = csv[i], nextChar = csv[i + 1];
                    if (char === '"' && insideQuotes && nextChar === '"') { currCell += '"'; i++; }
                    else if (char === '"') insideQuotes = !insideQuotes;
                    else if (char === ',' && !insideQuotes) { currLine.push(currCell.trim()); currCell = ''; }
                    else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) {
                        currLine.push(currCell.trim()); lines.push(currLine); currLine = []; currCell = '';
                        if (char === '\r') i++; 
                    } else if (char !== '\r' || insideQuotes) currCell += char;
                }
                currLine.push(currCell.trim());
                if (currLine.length > 0 || currCell !== '') lines.push(currLine);
                return lines.filter(row => row.length > 1 || (row.length === 1 && row[0] !== ''));
            };

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const fetches = [fetch(WATER_BILLS_URL), fetch(EXPENSES_URL), fetch(LOGIN_CSV_URL)];
                    if (USERS_CSV_URL) fetches.push(fetch(USERS_CSV_URL));
                    const res = await Promise.all(fetches);
                    const texts = await Promise.all(res.map(r => r.text()));
                    
                    const waterData = parseCSV(texts[0]).slice(1).filter(row => row[1] && row[1].trim() !== '').map(row => ({ date: (row[0] || '').toString().trim(), houseNo: row[1].toString().trim(), name: row[2], prev: parseNumber(row[3]), after: parseNumber(row[4]), unit: parseNumber(row[5]), waterCost: parseNumber(row[6]), maintenance: parseNumber(row[7]), total: parseNumber(row[8]), status: row[9] || 'ค้างชำระ' }));
                    const expenseData = parseCSV(texts[1]).slice(1).filter(row => row[0] && row[0].trim() !== '').map(row => ({ date: (row[0] || '').toString().trim(), revenue: parseNumber(row[1]), electric: parseNumber(row[2]), repair: parseNumber(row[3]), balance: parseNumber(row[4]) }));
                    
                    setWaterBills(waterData); setExpenses(expenseData); setAuthData(parseCSV(texts[2]));
                    const userMap = new Map(); waterData.forEach(item => { if (item.houseNo && !userMap.has(item.houseNo)) userMap.set(item.houseNo, item.name); });
                    setUsers(Array.from(userMap.entries()).map(([id, name]) => ({ id, name })));
                    
                    if (texts[3]) {
                        const regUsers = parseCSV(texts[3]).slice(1).map(row => {
                            const isDate = row[0] && row[0].includes('/');
                            return { id: isDate ? (row[1] || '').trim() : (row[0] || '').trim(), name: isDate ? (row[2] || '').trim() : (row[1] || '').trim() };
                        }).filter(u => u.id);
                        setRegisteredUsers(regUsers);
                    }
                } catch (err) { console.error(err); } finally { setIsLoading(false); }
            };

            useEffect(() => { fetchData(); }, []);

            const metrics = useMemo(() => {
                const revenue = waterBills.reduce((s, b) => s + b.total, 0);
                const electric = expenses.reduce((s, e) => s + e.electric, 0);
                const balance = expenses.length > 0 ? expenses[expenses.length - 1].balance : 0;
                const latestElec = expenses.length > 0 ? expenses[expenses.length - 1].electric : 0;
                return { currentMonthRevenue: revenue, totalElectricPaid: electric, latestBalance: balance, latestElectric: latestElec };
            }, [waterBills, expenses]);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = e.target.username.value.trim(), p = e.target.password.value.trim();
                const valid = authData.find(r => r[0] === u && r[1] === p);
                if (valid) { setIsLoggedIn(true); setLoggedInUser(valid[2] || 'นางศวรรยา  อุมงค์'); setView('admin_dashboard'); }
                else alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            };

            const getPreviousMeterValue = useMemo(() => (houseNo) => {
                const history = waterBills.filter(b => b.houseNo === houseNo);
                return history.length === 0 ? 0 : history[history.length - 1].after || 0;
            }, [waterBills]);

            return (
                <div className="min-h-screen text-slate-900 print:bg-white print:pb-0 font-['Prompt']">
                    <nav className="bg-white/80 backdrop-blur-2xl border-b border-slate-200/50 sticky top-0 z-50 print:hidden shadow-sm">
                        <div className="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('resident')}>
                                <div className="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20"><Icon name="fa-droplet" size={20} className="text-white" /></div>
                                <span className="font-extrabold text-xl md:text-2xl tracking-tighter uppercase italic text-slate-950">วารี<span className="text-blue-600">สมาร์ท</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-6">
                                {isLoggedIn && (
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => setView('admin_dashboard')} className={`px-5 py-2 rounded-full text-xs font-black tracking-widest ${view === 'admin_dashboard' ? 'bg-slate-950 text-white shadow-xl' : 'text-slate-500 hover:bg-slate-100'}`}>ADMIN</button>
                                        <button onClick={() => { setIsLoggedIn(false); setView('resident'); }} className="p-2 text-red-600 hover:bg-red-50 rounded-full transition-all"><Icon name="fa-power-off" size={18} /></button>
                                    </div>
                                )}
                            </div>
                            <button className="md:hidden p-2 text-slate-950" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><Icon name={isMobileMenuOpen ? "fa-xmark" : "fa-bars"} size={22} /></button>
                        </div>
                    </nav>

                    <main className="py-6 md:py-10 px-4 md:px-6 print:py-0 print:px-0">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-48 gap-6 print:hidden">
                                <div className="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                                <p className="font-bold text-slate-400 text-sm tracking-widest">W A R E E S M A R T</p>
                            </div>
                        ) : (
                            <>
                                {view === 'resident' && <ResidentView waterBills={waterBills} searchQuery={searchQuery} setSearchQuery={setSearchQuery} metrics={metrics} setView={setView} isLoggedIn={isLoggedIn} />}
                                {view === 'login' && (
                                    <div className="flex items-center justify-center min-h-[60vh] px-4 animate-in slide-in-from-bottom-8 duration-500">
                                        <div className="w-full max-w-sm bg-white rounded-[3rem] shadow-2xl p-10 md:p-12 border border-slate-100 text-center">
                                            <div className="ios-icon-container bg-slate-100 text-slate-950 mx-auto flex items-center justify-center mb-8"><Icon name="fa-lock" size={28} /></div>
                                            <h2 className="text-3xl font-extrabold text-slate-950 tracking-tighter mb-8">Admin Access</h2>
                                            <form onSubmit={handleLogin} className="space-y-6 text-left">
                                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">User Identity</label><input name="username" type="text" required className="w-full p-4 bg-slate-100 border-none rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all text-slate-950" placeholder="ชื่อผู้ใช้" /></div>
                                                <div className="space-y-1.5"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Access Key</label><input name="password" type="password" required className="w-full p-4 bg-slate-100 border-none rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all text-slate-950" placeholder="รหัสผ่าน" /></div>
                                                <button className="w-full bg-slate-950 text-white py-4 rounded-2xl font-black text-base shadow-xl hover:bg-black active:scale-95 transition-all mt-6">Authenticate</button>
                                                <button type="button" onClick={() => setView('resident')} className="w-full text-slate-400 font-bold py-2 text-sm">Return Home</button>
                                            </form>
                                        </div>
                                    </div>
                                )}
                                {isLoggedIn && (
                                    <div className="animate-in fade-in slide-in-from-bottom-6 duration-500">
                                        {view === 'admin_dashboard' && <AdminDashboard setView={setView} fetchData={fetchData} />}
                                        {view === 'print_bills' && <PrintBillsView setView={setView} waterBills={waterBills} loggedInUser={loggedInUser} />}
                                        {view === 'record_meter' && <RecordMeterForm setView={setView} users={users} registeredUsers={registeredUsers} getPreviousMeterValue={getPreviousMeterValue} />}
                                        {view === 'record_expense' && <RecordExpenseForm setView={setView} metrics={metrics} />}
                                    </div>
                                )}
                            </>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
